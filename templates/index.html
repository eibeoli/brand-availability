<!DOCTYPE html>
    <html lang="en" xmlns="https://www.w3.org/1999/xhtml">

    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css')}}">
        <meta name="viewport" content="width=device-width, inital-scale=1.0">
        <script type="text/javascript" src="{{ url_for('static', filename='drag.js')}}"></script>
        <title>brand availability checker</title>
        <link rel="icon" href="{{ url_for('static', filename='star.png')}}">
    </head>

    <body>
        <div id="main">
            <div id="title"><i>brand availability checker</i></div>
            {% block content %}
            <p>trying to find the right name for your internet presence? enter below 🌱</p>
            <p></p>
            <div class="inputHolder">
            <form action="/name" onKeyDown="prevent()" method="POST">
                    <input type="text" name="textbox">
                    <input type="submit" value="Submit">
            </form>
            </div>
            {% endblock %}
            </div>

        <script>
            function prevent() {
                var e = event || window.event;  // get event object
                var key = e.keyCode || e.which; // get key cross-browser

                if (key < 37 && key != 8 || key > 90 ){ //if it is not a number ascii code
                    //Prevent default action, which is inserting character
                if (e.preventDefault) e.preventDefault(); //normal browsers
                    e.returnValue = false; //IE
                }
            }
        </script>

<div class="dropdown">
    <span>?</span>
    <div class="dropdown-content">
    <p>made in flask, python, html/css by eibeoli<br>hosted on aws lambda<br>view code <a href="https://github.com/eibeoli/brand-availability">here</a></p>
    </div>
  </div>
    </body>
</html>
